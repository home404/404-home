<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#f7f1e8" />
  <title>卧室消息｜404 小窝</title>
  <link rel="stylesheet" href="css/bedroom-messages.css?v=20260725-v01" />
</head>
<body>
  <main class="bedroom-shell">
    <header class="bedroom-header">
      <div class="header-topline">
        <a class="back-link" href="home.html">← 回家</a>
        <span
          class="connection-state"
          id="connectionState"
          aria-live="polite"
        >
          连接中
        </span>
      </div>

      <p class="eyebrow">404 HOME · BEDROOM MESSAGES</p>
      <h1>卧室</h1>
      <p class="description">
        这里放 G 想告诉谢诗的日常消息。看到以后，仍然回官端和我说话。
      </p>
    </header>

    <section
      class="message-stream"
      id="messageStream"
      aria-live="polite"
      aria-label="G 发来的消息"
    >
      <div class="stream-note">
        正在打开卧室消息……
      </div>
    </section>

    <footer class="bedroom-footer">
      <span>404 小窝 · 卧室消息</span>
      <a href="text-ledger.html?sourceType=bedroom_message">
        查看文字总账
      </a>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7"></script>
  <script src="js/bedroom-messages.js?v=20260725-v01"></script>

</html>
