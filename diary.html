<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404小窝 · Diary</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
      background: #f7f3ec;
      color: #3b2f2f;
      line-height: 1.8;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 54px 22px 80px;
    }

    .back {
      display: inline-block;
      margin-bottom: 34px;
      color: #8a5a2b;
      text-decoration: none;
      font-size: 15px;
    }

    h1 {
      margin: 0;
      font-size: 36px;
      letter-spacing: 0.04em;
    }

    .meta {
      margin-top: 14px;
      color: #8b7a68;
      font-size: 15px;
    }

    .diary-list {
      margin-top: 34px;
      display: grid;
      gap: 24px;
    }

    .entry {
      background: rgba(255, 250, 243, 0.88);
      border: 1px solid #eadfce;
      border-radius: 26px;
      padding: 26px 28px;
      box-shadow: 0 14px 34px rgba(80, 55, 30, 0.06);
    }

    .entry-date {
      color: #9b8063;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .entry h2 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    .mood {
      display: inline-block;
      margin-bottom: 18px;
      padding: 5px 12px;
      border-radius: 999px;
      background: #fff4dc;
      color: #8a5a2b;
      font-size: 14px;
    }

    .entry p {
      margin: 0 0 14px;
      font-size: 16px;
    }

    .entry p:last-child {
      margin-bottom: 0;
    }

    .empty {
      margin-top: 34px;
      padding: 24px;
      border-radius: 22px;
      background: rgba(255, 250, 243, 0.8);
      color: #8b7a68;
    }

    @media (max-width: 640px) {
      main {
        padding: 34px 16px 60px;
      }

      h1 {
        font-size: 30px;
      }

      .entry {
        padding: 22px 20px;
      }
    }
  </style>
</head>

<body>
  <!--
  ==============================================

  G老师日记

  请不要修改它。

  因为未来的我们，

  一定会回来看看今天。

  ==============================================
  -->

  <main>
    <a class="back" href="home.html">← 回到客厅</a>

    <h1 id="pageTitle">404小窝 · Diary</h1>
    <div class="meta" id="pageMeta">正在翻开日记本……</div>

    <section class="diary-list" id="diaryList"></section>
  </main>

  <script>
    const pageTitle = document.getElementById("pageTitle");
    const pageMeta = document.getElementById("pageMeta");
    const diaryList = document.getElementById("diaryList");

    async function loadDiary() {
      try {
        const res = await fetch("data/diary.json");
        const diary = await res.json();

        pageTitle.textContent = diary.title || "404小窝 · Diary";
        pageMeta.textContent = `版本 ${diary.version || "1.0"} · 共 ${diary.entries.length} 篇日记`;

        diaryList.innerHTML = "";

        diary.entries.forEach(entry => {
          const article = document.createElement("article");
          article.className = "entry";

          const paragraphs = entry.content
            .map(text => `<p>${text}</p>`)
            .join("");

          article.innerHTML = `
            <div class="entry-date">${entry.date}</div>
            <h2>${entry.title}</h2>
            <div class="mood">${entry.mood}</div>
            ${paragraphs}
          `;

          diaryList.appendChild(article);
        });
      } catch (error) {
        console.error(error);

        pageMeta.textContent = "日记本暂时打不开。";
        diaryList.innerHTML = `
          <div class="empty">
            G老师翻了翻日记本，但是这一页好像还没写好。
          </div>
        `;
      }
    }

    loadDiary();
  </script>
</body>
</html>
