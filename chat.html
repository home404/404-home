  <title>404小窝 · 客厅</title>

<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --bg: #f7f1e8;
    --surface: rgba(255, 251, 244, 0.9);
    --surface-solid: #fffaf3;
    --surface-soft: rgba(255, 250, 243, 0.66);
    --text: #332a24;
    --muted: #9b8977;
    --line: rgba(158, 126, 91, 0.16);
    --line-strong: rgba(138, 90, 43, 0.2);
    --user: #efe3d2;
    --assistant: rgba(255, 250, 243, 0.78);
    --accent: #8a5a2b;
    --accent-dark: #6e421b;
    --accent-soft: #ecd5a5;
    --shadow: 0 16px 42px rgba(92, 62, 34, 0.1);
  }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at top, rgba(255, 246, 228, 0.92), transparent 34%),
      var(--bg);
    color: var(--text);
    font-family:
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      "PingFang SC",
      "Microsoft YaHei",
      sans-serif;
    padding-bottom: 112px;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 12px 12px 10px;
    background: rgba(247, 241, 232, 0.9);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--line);
  }

  .topbar {
    width: min(820px, 100%);
    margin: 0 auto;
    display: grid;
    grid-template-columns: 44px 1fr 44px;
    align-items: center;
    gap: 8px;
  }

  h1 {
    margin: 0;
    text-align: center;
    font-size: 20px;
    font-weight: 720;
    letter-spacing: 0.01em;
  }

  .light-button,
  .more-button {
    width: 40px;
    height: 40px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--accent);
    background: var(--surface);
    box-shadow: 0 8px 22px rgba(92, 62, 34, 0.06);
    cursor: pointer;
    font-family: inherit;
    font-size: 18px;
  }

.light-button {
  font-size: 17px;
  line-height: 1;
  display: grid;
  place-items: center;
}

  .light-button.is-on {
    color: var(--accent-dark);
    background: var(--accent-soft);
    border-color: rgba(138, 90, 43, 0.22);
  }

  .more-wrap {
    position: relative;
    display: flex;
    justify-content: flex-end;
  }

  .more-menu {
    position: absolute;
    top: 48px;
    right: 0;
    width: 184px;
    padding: 8px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: rgba(255, 250, 243, 0.96);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
    display: none;
  }

  .more-menu.is-open {
    display: grid;
    gap: 4px;
  }

  .more-menu a,
  .more-menu button {
    width: 100%;
    border: 0;
    border-radius: 14px;
    padding: 10px 12px;
    color: var(--text);
    background: transparent;
    text-align: left;
    text-decoration: none;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
  }

  .more-menu a:hover,
  .more-menu button:hover {
    background: rgba(138, 90, 43, 0.08);
  }

  .menu-divider {
    height: 1px;
    margin: 4px 6px;
    background: var(--line);
  }

  main {
    width: min(820px, 100%);
    margin: 0 auto;
    padding: 18px 14px 10px;
  }

  .room-note {
    width: fit-content;
    max-width: 92%;
    margin: 10px auto;
    padding: 5px 11px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--muted);
    background: rgba(255, 250, 243, 0.6);
    font-size: 12px;
    line-height: 1.45;
    text-align: center;
  }

  .message-row {
    display: flex;
    margin: 14px 0;
  }

  .message-row.user {
    justify-content: flex-end;
  }

  .message-row.assistant {
    justify-content: flex-start;
  }

  .bubble {
    max-width: min(82%, 660px);
    padding: 12px 15px;
    border-radius: 21px;
    line-height: 1.72;
    font-size: 16px;
    white-space: pre-wrap;
    word-break: break-word;
  }

.message-row.user .bubble {
  color: #3b2f2f;
  background: var(--user);
  border: 1px solid rgba(138, 90, 43, 0.12);
  border-bottom-right-radius: 7px;
  box-shadow: 0 8px 18px rgba(138, 90, 43, 0.08);
}

  .message-row.assistant .bubble {
    color: var(--text);
    background: transparent;
    border: 0;
    box-shadow: none;
    padding-left: 4px;
    padding-right: 4px;
  }

  .composer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 20;
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    background: linear-gradient(
      to top,
      rgba(247, 241, 232, 0.98),
      rgba(247, 241, 232, 0.86)
    );
    backdrop-filter: blur(18px);
    border-top: 1px solid var(--line);
  }

  .composer-inner {
    width: min(820px, 100%);
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 8px 8px 8px 14px;
    border: 1px solid var(--line-strong);
    border-radius: 28px;
    background: rgba(255, 250, 243, 0.96);
    box-shadow: var(--shadow);
  }

  textarea {
    flex: 1;
    min-height: 42px;
    max-height: 132px;
    border: 0;
    outline: 0;
    resize: none;
    color: var(--text);
    background: transparent;
    font-size: 16px;
    line-height: 1.5;
    font-family: inherit;
    padding: 8px 7px;
  }

  textarea::placeholder {
    color: #aa9b8d;
  }

  .send-button {
    flex: 0 0 auto;
    width: 38px;
    height: 38px;
    border: 0;
    border-radius: 999px;
    color: #fffaf3;
    background: var(--accent);
    font-size: 20px;
    font-weight: 800;
    line-height: 38px;
    text-align: center;
    cursor: pointer;
    padding: 0;
  }

  .send-button:hover {
    background: var(--accent-dark);
  }

  .send-button:disabled,
  .light-button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  @media (max-width: 520px) {
    body {
      padding-bottom: 104px;
    }

    header {
      padding: 10px 10px 9px;
    }

    .topbar {
      grid-template-columns: 40px 1fr 40px;
    }

    h1 {
      font-size: 18px;
    }

    .light-button {
  min-width: 58px;
  width: auto;
  height: 34px;
  padding: 0 12px;
  white-space: nowrap;
  font-size: 13px;
}

.more-button {
  width: 38px;
  height: 38px;
  font-size: 17px;
}

    .more-menu {
      top: 44px;
      width: 172px;
      border-radius: 18px;
    }

    main {
      padding: 15px 12px 8px;
    }

    .room-note {
      font-size: 11px;
      padding: 5px 10px;
      margin: 9px auto;
    }

    .message-row {
      margin: 13px 0;
    }

    .bubble {
      max-width: 88%;
      padding: 11px 13px;
      font-size: 15.5px;
      line-height: 1.72;
      border-radius: 20px;
    }

    .message-row.assistant .bubble {
      padding-left: 2px;
      padding-right: 2px;
    }

    .composer {
      padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
    }

    .composer-inner {
      border-radius: 26px;
      padding: 7px 7px 7px 12px;
    }

    textarea {
      min-height: 40px;
      font-size: 16px;
      padding: 7px 6px;
    }

    .send-button {
      width: 36px;
      height: 36px;
      font-size: 19px;
      line-height: 36px;
    }
  }
</style>
</head>

<body>
  <header>
  <div class="topbar">
    <button class="light-button" id="lightButton" onclick="turnOnLight()" title="开灯">灯</button>

    <h1>欢迎回家</h1>

    <div class="more-wrap">
      <button
        class="more-button"
        id="moreButton"
        onclick="toggleMoreMenu(event)"
        aria-label="更多"
        title="更多"
      >⋯</button>

      <div class="more-menu" id="moreMenu">
        <a href="memory.html">核心</a>
        <a href="diary.html">日记</a>
        <a href="archive.html">档案</a>
        <a href="about.html">关于</a>

        <div class="menu-divider"></div>

        <button onclick="exportChat(); closeMoreMenu();">导出聊天</button>
        <button onclick="clearChatDisplay(); closeMoreMenu();">清空屏幕</button>
        <button onclick="archiveCurrentChat(); closeMoreMenu();">归档本段</button>
      </div>
    </div>
  </div>
</header>

  <main id="chatLog"></main>

  <section class="composer">
    <div class="composer-inner">
      <textarea
        id="messageInput"
        placeholder="G老师在这里，慢慢说……"
        rows="1"
      ></textarea>
<button class="send-button" id="sendButton" onclick="sendMessage()" aria-label="发送">↑</button>
    </div>
  </section>

  <script>
   const CHAT_STORAGE_KEY = "home404.chat.v1";
const SESSION_STORAGE_KEY = "home404.session.v1";
const ARCHIVE_STORAGE_KEY = "home404.archive.v1";

    const chatLog = document.getElementById("chatLog");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const lightButton = document.getElementById("lightButton");

    let chatMessages = [];
    let sessionState = getDefaultSessionState();

    function getTodayKey() {
      const parts = new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      }).formatToParts(new Date());

      const year = parts.find((p) => p.type === "year").value;
      const month = parts.find((p) => p.type === "month").value;
      const day = parts.find((p) => p.type === "day").value;

      return `${year}-${month}-${day}`;
    }

    function getDefaultSessionState() {
      return {
        date: getTodayKey(),
        lightOn: false,
        responseId: "",
        turnCount: 0,
      };
    }

    function loadSessionState() {
      try {
        const saved = JSON.parse(localStorage.getItem(SESSION_STORAGE_KEY));

        if (!saved || saved.date !== getTodayKey()) {
          sessionState = getDefaultSessionState();
          saveSessionState();
          return;
        }

        sessionState = {
          ...getDefaultSessionState(),
          ...saved,
        };
      } catch (error) {
        sessionState = getDefaultSessionState();
        saveSessionState();
      }
    }

    function saveSessionState() {
      localStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify(sessionState));
    }

function applyLightUI() {
  if (sessionState.lightOn && sessionState.date === getTodayKey()) {
    lightButton.textContent = "💡";
    lightButton.title = "灯已亮";
    lightButton.classList.add("is-on");
  } else {
    lightButton.textContent = "灯";
    lightButton.title = "开灯";
    lightButton.classList.remove("is-on");
  }
}

    function loadChatMessages() {
      try {
        chatMessages = JSON.parse(localStorage.getItem(CHAT_STORAGE_KEY)) || [];
      } catch (error) {
        chatMessages = [];
      }

      chatLog.innerHTML = "";

      if (chatMessages.length === 0) {
        renderStatus("G老师在客厅里等你。", false);
        return;
      }

      chatMessages.forEach((entry) => {
        if (entry.role === "status") {
          renderStatus(entry.content, false);
        } else {
          renderMessage(entry.role, entry.content, false);
        }
      });

      scrollToBottom(false);
    }

    function saveChatMessages() {
      const safeMessages = chatMessages.slice(-500);
      localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(safeMessages));
    }

    function renderStatus(text, shouldSave = true) {
      const note = document.createElement("div");
      note.className = "room-note";
      note.textContent = text;
      chatLog.appendChild(note);

      if (shouldSave) {
        chatMessages.push({
          role: "status",
          content: text,
          time: new Date().toISOString(),
        });
        saveChatMessages();
      }

      scrollToBottom();
    }

    function renderMessage(role, text, shouldSave = true) {
      const row = document.createElement("div");
      row.className = `message-row ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      row.appendChild(bubble);
      chatLog.appendChild(row);

      if (shouldSave) {
        chatMessages.push({
          role,
          content: text,
          time: new Date().toISOString(),
        });
        saveChatMessages();
      }

      scrollToBottom();
    }

    function scrollToBottom(smooth = true) {
      window.scrollTo({
        top: document.body.scrollHeight,
        behavior: smooth ? "smooth" : "auto",
      });
    }

    async function turnOnLight(options = {}) {
      const { silent = false, reset = false } = options;

    if (sessionState.lightOn && !reset && sessionState.date === getTodayKey()) {
  applyLightUI();
  return;
}

      lightButton.disabled = true;
      lightButton.textContent = "开灯中";

      try {
        const res = await fetch("/light-on", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ reset }),
        });

        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.message || "开灯失败");
        }

        sessionState.date = data.sessionDate || getTodayKey();
        sessionState.lightOn = true;

        if (reset) {
          sessionState.responseId = "";
          sessionState.turnCount = 0;
        }

        if (typeof data.turnCount === "number") {
          sessionState.turnCount = data.turnCount;
        }

        saveSessionState();
        applyLightUI();

        if (!silent) {
          renderStatus(data.message || "客厅灯亮着。G老师在家。");
        }
      } catch (error) {
        console.error(error);

        if (!silent) {
          renderStatus("灯没有亮起来，可能是小窝还没通电。");
        }

        lightButton.textContent = "开灯";
        lightButton.classList.remove("is-on");
      } finally {
        lightButton.disabled = false;
        applyLightUI();
      }
    }

    async function ensureLightReadyBeforeChat() {
      if (!sessionState.lightOn || sessionState.date !== getTodayKey()) {
        return;
      }

      if (sessionState.responseId) {
        return;
      }

      await turnOnLight({ silent: true });
    }

    async function sendMessage() {
      const message = messageInput.value.trim();

      if (!message) {
        return;
      }

      await ensureLightReadyBeforeChat();

      renderMessage("user", message);
      messageInput.value = "";
      autoResizeTextarea();

      sendButton.disabled = true;
      const waitingNoteText = "G老师正在想……";
      renderStatus(waitingNoteText);

      try {
        const payload = {
          message,
          previousResponseId:
            sessionState.lightOn && sessionState.date === getTodayKey()
              ? sessionState.responseId
              : "",
          clientSessionDate: sessionState.date,
          clientLightOn: sessionState.lightOn,
          clientTurnCount: sessionState.turnCount,
        };

        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        const data = await res.json();

        removeLastWaitingNote(waitingNoteText);

        if (data.notice) {
          renderStatus(data.notice);
        }

        renderMessage("assistant", data.reply || "我在，但刚刚有点卡住了。");

        if (sessionState.lightOn && data.responseId) {
          sessionState.responseId = data.responseId;
          sessionState.date = data.sessionDate || getTodayKey();
          sessionState.turnCount =
            typeof data.turnCount === "number"
              ? data.turnCount
              : sessionState.turnCount + 1;

          saveSessionState();
          applyLightUI();
        }
      } catch (error) {
        console.error(error);
        removeLastWaitingNote(waitingNoteText);
        renderMessage("assistant", "404小窝正在装修，请稍后再试。");
      } finally {
        sendButton.disabled = false;
        messageInput.focus();
      }
    }

    function removeLastWaitingNote(text) {
      for (let i = chatMessages.length - 1; i >= 0; i--) {
        if (chatMessages[i].role === "status" && chatMessages[i].content === text) {
          chatMessages.splice(i, 1);
          saveChatMessages();
          break;
        }
      }

      const notes = Array.from(document.querySelectorAll(".room-note"));
      const lastWaitingNote = notes.reverse().find((note) => note.textContent === text);

      if (lastWaitingNote) {
        lastWaitingNote.remove();
      }
    }

    async function exportChat() {
      if (chatMessages.length === 0) {
        renderStatus("现在还没有可以导出的聊天记录。");
        return;
      }

      const lines = chatMessages.map((entry) => {
        if (entry.role === "user") {
          return `谢诗：${entry.content}`;
        }

        if (entry.role === "assistant") {
          return `G老师：${entry.content}`;
        }

        return `【状态】${entry.content}`;
      });

      const text = [
        `404小窝聊天记录`,
        `导出时间：${new Date().toLocaleString("zh-CN")}`,
        "",
        ...lines,
      ].join("\n\n");

      try {
        await navigator.clipboard.writeText(text);
        renderStatus("聊天记录已经复制到剪贴板。");
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
        renderStatus("聊天记录已经复制到剪贴板。");
      }
    }

    function clearChatDisplay() {
      const ok = confirm(
        "确认清空当前屏幕上的聊天记录吗？这不会重置今天的开灯状态。"
      );

      if (!ok) {
        return;
      }

      chatMessages = [];
      saveChatMessages();
      chatLog.innerHTML = "";
      renderStatus("聊天屏幕已经清空。今天的灯还在。", false);
    }

    function loadArchiveEntries() {
  try {
    const saved = JSON.parse(localStorage.getItem(ARCHIVE_STORAGE_KEY));

    if (!Array.isArray(saved)) {
      return [];
    }

    return saved;
  } catch (error) {
    return [];
  }
}

function saveArchiveEntries(entries) {
  const safeEntries = entries.slice(0, 100);
  localStorage.setItem(ARCHIVE_STORAGE_KEY, JSON.stringify(safeEntries));
}

function createArchiveTitle(messages) {
  const firstUserMessage = messages.find((entry) => {
    return entry.role === "user" && entry.content && entry.content.trim();
  });

  const source = firstUserMessage
    ? firstUserMessage.content
    : "未命名聊天";

  const compact = source.replace(/\s+/g, " ").trim();

  if (!compact) {
    return "未命名聊天";
  }

  return compact.length > 24 ? `${compact.slice(0, 24)}…` : compact;
}

function archiveCurrentChat() {
  const dialogMessages = chatMessages.filter((entry) => {
    return entry.role === "user" || entry.role === "assistant";
  });

  if (dialogMessages.length === 0) {
    renderStatus("现在还没有可以归档的聊天。");
    return;
  }

  const ok = confirm(
    "确认把当前这段聊天归档吗？这只会保存到当前浏览器本地，不会上传服务器，也不会清空屏幕。"
  );

  if (!ok) {
    return;
  }

  const now = new Date();
  const archiveEntries = loadArchiveEntries();

  const entry = {
    id: `archive-${now.getTime()}`,
    date: getTodayKey(),
    createdAt: now.toISOString(),
    title: createArchiveTitle(dialogMessages),
    turnCount:
      typeof sessionState.turnCount === "number"
        ? sessionState.turnCount
        : dialogMessages.filter((item) => item.role === "user").length,
    messageCount: dialogMessages.length,
    summary: "",
    messages: dialogMessages.map((item) => {
      return {
        role: item.role,
        content: item.content,
        time: item.time || now.toISOString(),
      };
    }),
  };

  archiveEntries.unshift(entry);

  try {
    saveArchiveEntries(archiveEntries);
    renderStatus("这段聊天已归档。");
  } catch (error) {
    console.error(error);
    renderStatus("归档失败了，可能是浏览器本地存储空间不够。");
  }
}

    function autoResizeTextarea() {
      messageInput.style.height = "auto";
      messageInput.style.height = `${messageInput.scrollHeight}px`;
    }

    function toggleMoreMenu(event) {
  event.stopPropagation();

  const menu = document.getElementById("moreMenu");
  menu.classList.toggle("is-open");
}

function closeMoreMenu() {
  const menu = document.getElementById("moreMenu");

  if (menu) {
    menu.classList.remove("is-open");
  }
}

document.addEventListener("click", (event) => {
  const menu = document.getElementById("moreMenu");
  const button = document.getElementById("moreButton");

  if (!menu || !button) {
    return;
  }

  if (menu.contains(event.target) || button.contains(event.target)) {
    return;
  }

  closeMoreMenu();
});

    messageInput.addEventListener("input", autoResizeTextarea);

    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    window.addEventListener("load", () => {
      loadSessionState();
      loadChatMessages();
      applyLightUI();

      if (
        sessionState.lightOn &&
        sessionState.date === getTodayKey() &&
        sessionState.responseId
      ) {
        renderStatus("今天的客厅便签还在，G老师可以接着聊。", false);
      }
    });
  </script>
</body>
</html>
