name: Apply resident mode runtime patch

on:
  push:
    branches:
      - feat/resident-bedroom-v1

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[resident-patch-applied]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feat/resident-bedroom-v1
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Normalize patch source punctuation
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-resident-mode-runtime-patch.mjs')
          text = path.read_text(encoding='utf-8')
          text = text.replace('previousResponseId.', 'previousResponseId。')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Apply runtime patch
        run: node scripts/apply-resident-mode-runtime-patch.mjs

      - name: Run tests and syntax checks
        run: |
          npm test
          node --check worker/heart-worker-v04.mjs
          node --check services/heart-service.mjs
          node --check services/heart-policy-service.mjs
          node --check services/daily-activity-note-service.mjs
          node --check js/home.js
          node --check js/heart-settings.js
          node --check js/bedroom-v2.js

      - name: Commit generated changes
        run: |
          git config user.name "404 construction fox"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat: complete resident mode runtime [resident-patch-applied]"
          git push origin HEAD:feat/resident-bedroom-v1
