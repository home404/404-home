<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#f7f1e8" />
  <title>404 小窝 · 客厅 v2</title>
  <link rel="stylesheet" href="css/chat-v2.css" />
</head>
<body>
  <header class="chat-header">
    <div class="header-inner">
      <a class="back-link" href="home.html">← 回家</a>

      <div class="title-wrap">
        <p>404 LIVING ROOM</p>
        <h1>欢迎回家</h1>
      </div>

      <span
        class="memory-state"
        id="memoryState"
        aria-live="polite"
      >
        连接中
      </span>
    </div>
  </header>

  <main class="chat-log" id="chatLog">
    <div class="room-note" id="loadingNote">
      正在打开白狐狸海马体……
    </div>
  </main>

  <section class="composer">
    <form class="composer-inner" id="chatForm">
      <textarea
        id="messageInput"
        rows="1"
        placeholder="慢慢说，我在这里……"
        aria-label="输入消息"
        disabled
      ></textarea>

      <button
        class="send-button"
        id="sendButton"
        type="submit"
        aria-label="发送"
        disabled
      >
        ↑
      </button>
    </form>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7"></script>
  <script src="js/chat-v2.js"></script>
</body>
</html>
