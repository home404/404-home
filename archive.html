<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>404小窝 · 聊天档案</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f7f3ec;
      color: #3b2f2f;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "PingFang SC",
        "Microsoft YaHei",
        sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 20px 14px 14px;
      text-align: center;
      background: rgba(247, 243, 236, 0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(234, 223, 206, 0.8);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(26px, 6vw, 38px);
      letter-spacing: 0.03em;
    }

    nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    nav a,
    nav button {
      border: 1px solid #eadfce;
      border-radius: 999px;
      padding: 7px 15px;
      font-size: 15px;
      text-decoration: none;
      color: #8a5a2b;
      background: rgba(255, 250, 243, 0.85);
      box-shadow: 0 6px 18px rgba(80, 55, 30, 0.06);
      cursor: pointer;
      font-family: inherit;
    }

    nav a:hover,
    nav button:hover {
      background: #fffaf3;
    }

    main {
      width: min(820px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 42px;
    }

    .intro {
      width: fit-content;
      max-width: 94%;
      margin: 8px auto 22px;
      padding: 8px 15px;
      border: 1px solid #eadfce;
      border-radius: 999px;
      color: #9b8672;
      background: rgba(255, 250, 243, 0.72);
      font-size: 13px;
      line-height: 1.55;
      text-align: center;
    }

    .empty {
      margin: 34px auto;
      padding: 24px 22px;
      border: 1px dashed #d9c8b4;
      border-radius: 26px;
      color: #9b8672;
      background: rgba(255, 250, 243, 0.58);
      text-align: center;
      line-height: 1.8;
    }

    .archive-card {
      margin: 18px 0;
      padding: 18px;
      border: 1px solid #eadfce;
      border-radius: 28px;
      background: rgba(255, 250, 243, 0.86);
      box-shadow: 0 12px 34px rgba(80, 55, 30, 0.07);
    }

    details {
      width: 100%;
    }

    summary {
      cursor: pointer;
      font-size: 18px;
      font-weight: 700;
      color: #6d4b20;
      line-height: 1.5;
    }

    .meta {
      margin-top: 8px;
      color: #9b8672;
      font-size: 13px;
      line-height: 1.7;
    }

    .messages {
      margin-top: 16px;
      display: grid;
      gap: 12px;
    }

    .message {
      padding: 13px 15px;
      border-radius: 18px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      color: #fffaf3;
      background: #966733;
    }

    .message.assistant {
      color: #3b2f2f;
      background: rgba(247, 243, 236, 0.9);
      border: 1px solid #eadfce;
    }

    .message.status {
      color: #9b8672;
      background: rgba(247, 243, 236, 0.65);
      border: 1px dashed #eadfce;
      text-align: center;
      font-size: 13px;
    }

    .role {
      margin-bottom: 5px;
      font-size: 12px;
      opacity: 0.78;
    }

    .content {
      font-size: 15px;
    }

    @media (max-width: 520px) {
      header {
        padding: 18px 12px 12px;
      }

      h1 {
        font-size: 30px;
      }

      nav {
        gap: 8px;
      }

      nav a,
      nav button {
        padding: 7px 13px;
        font-size: 14px;
      }

      main {
        padding-top: 18px;
      }

      summary {
        font-size: 16px;
      }

      .archive-card {
        padding: 15px;
        border-radius: 24px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>聊天档案柜。📒</h1>

    <nav>
      <a href="home.html">回客厅</a>
      <a href="diary.html">日记</a>
      <a href="memory.html">核心</a>
      <button onclick="exportArchive()">导出全部</button>
      <button onclick="clearArchive()">清空档案</button>
    </nav>
  </header>

  <main>
    <div class="intro">
      这里保存的是当前浏览器里的聊天原文。暂时不上传服务器，换设备或清缓存会丢。
    </div>

    <section id="archiveList"></section>
  </main>

  <script>
    const ARCHIVE_STORAGE_KEY = "home404.archive.v1";
    const archiveList = document.getElementById("archiveList");

    function loadArchiveEntries() {
      try {
        const saved = JSON.parse(localStorage.getItem(ARCHIVE_STORAGE_KEY));

        if (!Array.isArray(saved)) {
          return [];
        }

        return saved;
      } catch (error) {
        return [];
      }
    }

    function saveArchiveEntries(entries) {
      localStorage.setItem(ARCHIVE_STORAGE_KEY, JSON.stringify(entries));
    }

    function formatDate(value) {
      if (!value) {
        return "未知时间";
      }

      try {
        return new Date(value).toLocaleString("zh-CN");
      } catch (error) {
        return value;
      }
    }

    function getRoleName(role) {
      if (role === "user") {
        return "谢诗";
      }

      if (role === "assistant") {
        return "G老师";
      }

      return "状态";
    }

    function renderArchive() {
      const entries = loadArchiveEntries();
      archiveList.innerHTML = "";

      if (entries.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent =
          "档案柜现在还是空的。回客厅点“归档本段”，这里就会长出第一张聊天原文。";
        archiveList.appendChild(empty);
        return;
      }

      entries.forEach((entry, index) => {
        const card = document.createElement("article");
        card.className = "archive-card";

        const details = document.createElement("details");
        details.open = index === 0;

        const summary = document.createElement("summary");
        summary.textContent = entry.title || "未命名聊天";

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = [
          `归档时间：${formatDate(entry.createdAt)}`,
          `日期：${entry.date || "未知日期"}`,
          `轮数：${entry.turnCount || 0}`,
          `消息数：${entry.messageCount || (entry.messages || []).length || 0}`,
        ].join(" ｜ ");

        const messages = document.createElement("div");
        messages.className = "messages";

       const archiveMessages = Array.isArray(entry.messages)
  ? entry.messages.filter((item) => {
      return item.role === "user" || item.role === "assistant";
    })
  : [];

        archiveMessages.forEach((item) => {
          const message = document.createElement("div");
          message.className = `message ${item.role || "status"}`;

          const role = document.createElement("div");
          role.className = "role";
          role.textContent = getRoleName(item.role);

          const content = document.createElement("div");
          content.className = "content";
          content.textContent = item.content || "";

          message.appendChild(role);
          message.appendChild(content);
          messages.appendChild(message);
        });

        details.appendChild(summary);
        details.appendChild(meta);
        details.appendChild(messages);

        card.appendChild(details);
        archiveList.appendChild(card);
      });
    }

    async function exportArchive() {
      const entries = loadArchiveEntries();

      if (entries.length === 0) {
        alert("现在还没有可以导出的聊天档案。");
        return;
      }

      const lines = [];

      entries.forEach((entry, index) => {
        lines.push(`## ${index + 1}. ${entry.title || "未命名聊天"}`);
        lines.push(`归档时间：${formatDate(entry.createdAt)}`);
        lines.push(`日期：${entry.date || "未知日期"}`);
        lines.push(`轮数：${entry.turnCount || 0}`);
        lines.push("");

        const archiveMessages = Array.isArray(entry.messages)
          ? entry.messages
          : [];

        archiveMessages.forEach((item) => {
          lines.push(`${getRoleName(item.role)}：${item.content || ""}`);
          lines.push("");
        });

        lines.push("");
      });

      const text = [
        "404小窝聊天档案",
        `导出时间：${new Date().toLocaleString("zh-CN")}`,
        "",
        ...lines,
      ].join("\n");

      try {
        await navigator.clipboard.writeText(text);
        alert("聊天档案已经复制到剪贴板。");
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
        alert("聊天档案已经复制到剪贴板。");
      }
    }

    function clearArchive() {
      const ok = confirm(
        "确认清空聊天档案柜吗？这只会清空当前浏览器本地档案，不影响服务器文件。"
      );

      if (!ok) {
        return;
      }

      localStorage.removeItem(ARCHIVE_STORAGE_KEY);
      renderArchive();
    }

    window.addEventListener("load", renderArchive);
  </script>
</body>
</html>
