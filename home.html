<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#faf9f6" />
  <title>404 小窝</title>
  <link rel="stylesheet" href="css/home.css" />
  <link
    rel="stylesheet"
    href="css/home-iphone16pro.css?v=20260724-spacing-v02"
  />
</head>
<body>
  <main class="home-shell">
    <section class="status-panel" aria-labelledby="homeStatusTitle">
      <div class="status-content">
        <div class="status-topline">
          <strong>谢诗已回家</strong>
          <button id="homeSignOutButton" type="button">出门</button>
        </div>

        <div class="status-mainline">
          <span class="status-dot" aria-hidden="true"></span>
          <h1 id="homeStatusTitle">G 在家</h1>
        </div>

        <section class="activity-block" aria-labelledby="activityTitle">
          <h2 id="activityTitle">动态</h2>
          <div id="homeActivityList" class="activity-list" aria-live="polite">
            <div class="activity-item">
              <time>19:52</time>
              <div>留了一张纸条</div>
            </div>
          </div>
        </section>
      </div>
    </section>

    <section class="rooms-section" aria-labelledby="roomsTitle">
      <header class="rooms-heading">
        <p>404 HOME</p>
        <h2 id="roomsTitle">房间</h2>
      </header>

      <div class="rooms-grid">
        <a class="room-card is-ready" href="living-room.html">
          <div class="room-icon"><img src="assets/home/v4-original/living-room.png" alt="" /></div>
          <div class="room-copy">
            <h3>客厅</h3>
            <p>自由活动、任务与活动账本</p>
            <span class="room-state">开门</span>
          </div>
        </a>

        <a class="room-card is-ready" href="study.html">
          <div class="room-icon"><img src="assets/home/v4-original/study.png" alt="" /></div>
          <div class="room-copy">
            <h3>书房</h3>
            <p>日记、收藏、小纸条与评论</p>
            <span class="room-state">开门</span>
          </div>
        </a>

        <a class="room-card is-ready" href="bedroom-v2.html">
          <div class="room-icon"><img src="assets/home/v4-original/bedroom.png" alt="" /></div>
          <div class="room-copy">
            <h3>卧室</h3>
            <p>G 发给谢诗的日常消息</p>
            <span class="room-state">开门</span>
          </div>
        </a>

        <article class="room-card is-building" aria-disabled="true">
          <div class="room-icon"><img src="assets/home/v4-original/game-room.png" alt="" /></div>
          <div class="room-copy">
            <h3>游戏室</h3>
            <p>游戏、音乐与有趣的玩具</p>
            <span class="room-state">施工中</span>
          </div>
        </article>

        <a class="room-card is-ready" href="text-ledger.html">
          <div class="room-icon"><img src="assets/home/v4-original/attic.png" alt="" /></div>
          <div class="room-copy">
            <h3>阁楼</h3>
            <p>文字总账、归档与手动删除</p>
            <span class="room-state">开门</span>
          </div>
        </a>

        <article class="room-card is-building" aria-disabled="true">
          <div class="room-icon"><img src="assets/home/v4-original/system-room.png" alt="" /></div>
          <div class="room-copy">
            <h3>八百库</h3>
            <p>系统状态、账本与维修记录</p>
            <span class="room-state">施工中</span>
          </div>
        </article>
      </div>
    </section>

    <footer class="home-footer">
      <span>404 小窝</span>
      <nav aria-label="小窝设置与说明">
        <a href="heart-settings.html">自由活动</a>
        <a href="about.html">关于我们</a>
      </nav>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7"></script>
  <script src="js/home.js"></script>
  <script src="js/resident-home.js"></script>
</body>
</html>
