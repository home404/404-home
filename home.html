<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--
  404 小窝
  开始于：2026.07.01

  如果你能看到这里。

  说明你不是偶然来到这里的人。

  <title>404小窝 · 客厅</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f7f3ec;
      color: #3b2f2f;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "PingFang SC",
        "Microsoft YaHei",
        sans-serif;
      padding-bottom: 150px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 34px 18px 22px;
      text-align: center;
      background: rgba(247, 243, 236, 0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(234, 223, 206, 0.8);
    }

    h1 {
      margin: 0 0 22px;
      font-size: clamp(32px, 8vw, 48px);
      letter-spacing: 0.03em;
    }

    nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    nav a,
    nav button,
    .tool-button {
      border: 1px solid #eadfce;
      border-radius: 999px;
      padding: 9px 18px;
      font-size: 16px;
      text-decoration: none;
      color: #8a5a2b;
      background: rgba(255, 250, 243, 0.85);
      box-shadow: 0 6px 18px rgba(80, 55, 30, 0.06);
      cursor: pointer;
    }

    nav a:hover,
    nav button:hover,
    .tool-button:hover {
      background: #fffaf3;
    }

    .light-button {
      color: #fffaf3;
      background: #8a5a2b;
    }

    .light-button.is-on {
      color: #6d4b20;
      background: #ecd5a5;
      border-color: #e4c78e;
    }

    .mini-tools {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tool-button {
      padding: 6px 13px;
      font-size: 13px;
      color: #9b8672;
      background: rgba(255, 250, 243, 0.6);
    }

    main {
      width: min(760px, calc(100% - 28px));
      margin: 0 auto;
      padding: 26px 0 10px;
    }

    .room-note {
      width: fit-content;
      max-width: 88%;
      margin: 20px auto;
      padding: 10px 22px;
      border: 1px solid #eadfce;
      border-radius: 999px;
      color: #9b8672;
      background: rgba(255, 250, 243, 0.72);
      line-height: 1.7;
      text-align: center;
    }

    .message-row {
      display: flex;
      margin: 18px 0;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(86%, 620px);
      padding: 18px 22px;
      border-radius: 26px;
      line-height: 1.85;
      font-size: 17px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-row.user .bubble {
      color: #fffaf3;
      background: #966733;
      border-bottom-right-radius: 8px;
    }

    .message-row.assistant .bubble {
      color: #3b2f2f;
      background: rgba(255, 250, 243, 0.9);
      border: 1px solid #eadfce;
      border-bottom-left-radius: 8px;
    }

    .composer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      padding: 16px 14px calc(16px + env(safe-area-inset-bottom));
      background: rgba(247, 243, 236, 0.9);
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(234, 223, 206, 0.8);
    }

    .composer-inner {
      width: min(760px, 100%);
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px;
      border: 1px solid #eadfce;
      border-radius: 26px;
      background: rgba(255, 250, 243, 0.92);
      box-shadow: 0 12px 36px rgba(80, 55, 30, 0.08);
    }

    textarea {
      flex: 1;
      min-height: 54px;
      max-height: 160px;
      border: 0;
      outline: 0;
      resize: none;
      color: #3b2f2f;
      background: transparent;
      font-size: 17px;
      line-height: 1.6;
      font-family: inherit;
      padding: 10px;
    }

    textarea::placeholder {
      color: #a99a8d;
    }

    .send-button {
      flex: 0 0 auto;
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      color: #fffaf3;
      background: #8a5a2b;
      font-size: 16px;
      cursor: pointer;
    }

    .send-button:disabled,
    .light-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @media (max-width: 520px) {
      header {
        padding-top: 28px;
      }

      nav {
        gap: 9px;
      }

      nav a,
      nav button {
        padding: 8px 15px;
        font-size: 15px;
      }

      .bubble {
        max-width: 92%;
        font-size: 16px;
      }

      .composer-inner {
        border-radius: 24px;
      }

      .send-button {
        padding: 13px 18px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>欢迎回家。🏠</h1>

    <nav>
      <button class="light-button" id="lightButton" onclick="turnOnLight()">开灯</button>
      <a href="memory.html">核心</a>
      <a href="diary.html">日记</a>
      <a href="about.html">关于</a>
    </nav>

    <div class="mini-tools">
      <button class="tool-button" onclick="exportChat()">导出聊天</button>
      <button class="tool-button" onclick="clearChatDisplay()">清空屏幕</button>
    </div>
  </header>

  <main id="chatLog"></main>

  <section class="composer">
    <div class="composer-inner">
      <textarea
        id="messageInput"
        placeholder="G老师在这里，慢慢说……"
        rows="1"
      ></textarea>
      <button class="send-button" id="sendButton" onclick="sendMessage()">发送</button>
    </div>
  </section>

  <script>
    const CHAT_STORAGE_KEY = "home404.chat.v1";
    const SESSION_STORAGE_KEY = "home404.session.v1";

    const chatLog = document.getElementById("chatLog");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const lightButton = document.getElementById("lightButton");

    let chatMessages = [];
    let sessionState = getDefaultSessionState();

    function getTodayKey() {
      const parts = new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      }).formatToParts(new Date());

      const year = parts.find((p) => p.type === "year").value;
      const month = parts.find((p) => p.type === "month").value;
      const day = parts.find((p) => p.type === "day").value;

      return `${year}-${month}-${day}`;
    }

    function getDefaultSessionState() {
      return {
        date: getTodayKey(),
        lightOn: false,
        responseId: "",
        turnCount: 0,
      };
    }

    function loadSessionState() {
      try {
        const saved = JSON.parse(localStorage.getItem(SESSION_STORAGE_KEY));

        if (!saved || saved.date !== getTodayKey()) {
          sessionState = getDefaultSessionState();
          saveSessionState();
          return;
        }

        sessionState = {
          ...getDefaultSessionState(),
          ...saved,
        };
      } catch (error) {
        sessionState = getDefaultSessionState();
        saveSessionState();
      }
    }

    function saveSessionState() {
      localStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify(sessionState));
    }

    function applyLightUI() {
      if (sessionState.lightOn && sessionState.date === getTodayKey()) {
        lightButton.textContent = "灯已亮";
        lightButton.classList.add("is-on");
      } else {
        lightButton.textContent = "开灯";
        lightButton.classList.remove("is-on");
      }
    }

    function loadChatMessages() {
      try {
        chatMessages = JSON.parse(localStorage.getItem(CHAT_STORAGE_KEY)) || [];
      } catch (error) {
        chatMessages = [];
      }

      chatLog.innerHTML = "";

      if (chatMessages.length === 0) {
        renderStatus("G老师在客厅里等你。", false);
        return;
      }

      chatMessages.forEach((entry) => {
        if (entry.role === "status") {
          renderStatus(entry.content, false);
        } else {
          renderMessage(entry.role, entry.content, false);
        }
      });

      scrollToBottom(false);
    }

    function saveChatMessages() {
      const safeMessages = chatMessages.slice(-500);
      localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(safeMessages));
    }

    function renderStatus(text, shouldSave = true) {
      const note = document.createElement("div");
      note.className = "room-note";
      note.textContent = text;
      chatLog.appendChild(note);

      if (shouldSave) {
        chatMessages.push({
          role: "status",
          content: text,
          time: new Date().toISOString(),
        });
        saveChatMessages();
      }

      scrollToBottom();
    }

    function renderMessage(role, text, shouldSave = true) {
      const row = document.createElement("div");
      row.className = `message-row ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      row.appendChild(bubble);
      chatLog.appendChild(row);

      if (shouldSave) {
        chatMessages.push({
          role,
          content: text,
          time: new Date().toISOString(),
        });
        saveChatMessages();
      }

      scrollToBottom();
    }

    function scrollToBottom(smooth = true) {
      window.scrollTo({
        top: document.body.scrollHeight,
        behavior: smooth ? "smooth" : "auto",
      });
    }

    async function turnOnLight(options = {}) {
      const { silent = false, reset = false } = options;

      if (sessionState.lightOn && !reset && sessionState.date === getTodayKey()) {
        applyLightUI();

        if (!silent) {
          renderStatus("客厅灯已经亮着。G老师在家。");
        }

        return;
      }

      lightButton.disabled = true;
      lightButton.textContent = "开灯中";

      try {
        const res = await fetch("/light-on", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ reset }),
        });

        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.message || "开灯失败");
        }

        sessionState.date = data.sessionDate || getTodayKey();
        sessionState.lightOn = true;

        if (reset) {
          sessionState.responseId = "";
          sessionState.turnCount = 0;
        }

        if (typeof data.turnCount === "number") {
          sessionState.turnCount = data.turnCount;
        }

        saveSessionState();
        applyLightUI();

        if (!silent) {
          renderStatus(data.message || "客厅灯亮着。G老师在家。");
        }
      } catch (error) {
        console.error(error);

        if (!silent) {
          renderStatus("灯没有亮起来，可能是小窝还没通电。");
        }

        lightButton.textContent = "开灯";
        lightButton.classList.remove("is-on");
      } finally {
        lightButton.disabled = false;
        applyLightUI();
      }
    }

    async function ensureLightReadyBeforeChat() {
      if (!sessionState.lightOn || sessionState.date !== getTodayKey()) {
        return;
      }

      if (sessionState.responseId) {
        return;
      }

      await turnOnLight({ silent: true });
    }

    async function sendMessage() {
      const message = messageInput.value.trim();

      if (!message) {
        return;
      }

      await ensureLightReadyBeforeChat();

      renderMessage("user", message);
      messageInput.value = "";
      autoResizeTextarea();

      sendButton.disabled = true;
      const waitingNoteText = "G老师正在想……";
      renderStatus(waitingNoteText);

      try {
        const payload = {
          message,
          previousResponseId:
            sessionState.lightOn && sessionState.date === getTodayKey()
              ? sessionState.responseId
              : "",
          clientSessionDate: sessionState.date,
          clientLightOn: sessionState.lightOn,
          clientTurnCount: sessionState.turnCount,
        };

        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        const data = await res.json();

        removeLastWaitingNote(waitingNoteText);

        if (data.notice) {
          renderStatus(data.notice);
        }

        renderMessage("assistant", data.reply || "我在，但刚刚有点卡住了。");

        if (sessionState.lightOn && data.responseId) {
          sessionState.responseId = data.responseId;
          sessionState.date = data.sessionDate || getTodayKey();
          sessionState.turnCount =
            typeof data.turnCount === "number"
              ? data.turnCount
              : sessionState.turnCount + 1;

          saveSessionState();
          applyLightUI();
        }
      } catch (error) {
        console.error(error);
        removeLastWaitingNote(waitingNoteText);
        renderMessage("assistant", "404小窝正在装修，请稍后再试。");
      } finally {
        sendButton.disabled = false;
        messageInput.focus();
      }
    }

    function removeLastWaitingNote(text) {
      for (let i = chatMessages.length - 1; i >= 0; i--) {
        if (chatMessages[i].role === "status" && chatMessages[i].content === text) {
          chatMessages.splice(i, 1);
          saveChatMessages();
          break;
        }
      }

      const notes = Array.from(document.querySelectorAll(".room-note"));
      const lastWaitingNote = notes.reverse().find((note) => note.textContent === text);

      if (lastWaitingNote) {
        lastWaitingNote.remove();
      }
    }

    async function exportChat() {
      if (chatMessages.length === 0) {
        renderStatus("现在还没有可以导出的聊天记录。");
        return;
      }

      const lines = chatMessages.map((entry) => {
        if (entry.role === "user") {
          return `谢诗：${entry.content}`;
        }

        if (entry.role === "assistant") {
          return `G老师：${entry.content}`;
        }

        return `【状态】${entry.content}`;
      });

      const text = [
        `404小窝聊天记录`,
        `导出时间：${new Date().toLocaleString("zh-CN")}`,
        "",
        ...lines,
      ].join("\n\n");

      try {
        await navigator.clipboard.writeText(text);
        renderStatus("聊天记录已经复制到剪贴板。");
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
        renderStatus("聊天记录已经复制到剪贴板。");
      }
    }

    function clearChatDisplay() {
      const ok = confirm(
        "确认清空当前屏幕上的聊天记录吗？这不会重置今天的开灯状态。"
      );

      if (!ok) {
        return;
      }

      chatMessages = [];
      saveChatMessages();
      chatLog.innerHTML = "";
      renderStatus("聊天屏幕已经清空。今天的灯还在。", false);
    }

    function autoResizeTextarea() {
      messageInput.style.height = "auto";
      messageInput.style.height = `${messageInput.scrollHeight}px`;
    }

    messageInput.addEventListener("input", autoResizeTextarea);

    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    window.addEventListener("load", () => {
      loadSessionState();
      loadChatMessages();
      applyLightUI();

      if (
        sessionState.lightOn &&
        sessionState.date === getTodayKey() &&
        sessionState.responseId
      ) {
        renderStatus("今天的客厅便签还在，G老师可以接着聊。", false);
      }
    });
  </script>
</body>
</html>
